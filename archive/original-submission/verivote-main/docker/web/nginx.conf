server {
    listen 18340;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets
    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location = /health {
        default_type text/plain;
        return 200 "ok\n";
    }
}
